<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karga - Gestion Ultra-Simple</title>
    <style>
        body { font-family: sans-serif; margin: 15px; background: #f0f4f8; color: #102a43; }
        .card { background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; color: #102a43; font-size: 1.1rem; border-bottom: 2px solid #bcccdc; padding-bottom: 5px; }
        label { font-size: 0.85rem; font-weight: bold; color: #486581; display: block; margin-top: 8px; }
        input, select { width: 100%; padding: 12px; margin: 6px 0; box-sizing: border-box; border: 1px solid #bac7d5; border-radius: 6px; font-size: 1rem; }
        button { width: 100%; padding: 12px; background: #627d98; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 5px; }
        .btn-boss { background: #0b69a3; }
        .btn-mouvement { background: #243b53; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border-bottom: 1px solid #e4e7eb; padding: 12px 10px; text-align: left; font-size: 0.9rem; }
        th { background: #f0f4f8; color: #486581; }
        .badge-stock { background: #dceefb; color: #0b69a3; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .grid-3 { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; }
        .report-box { background: #f0f4f8; padding: 10px; border-radius: 6px; font-family: monospace; font-size: 0.85rem; white-space: pre-line; margin-top: 10px; border-left: 4px solid #627d98; }
    </style>
</head>
<body>

    <h1>Karga Dépôt 🎯</h1>

    <div class="card" style="border-top: 4px solid #243b53;">
        <h2>1. Espace Contremaître (Création & Mouvements)</h2>
        
        <div style="background: #f0f4f8; padding: 10px; border-radius: 6px; margin-bottom: 15px;">
            <span style="font-size: 0.8rem; font-weight: bold; color: #486581;">+ CRÉER UN NOUVEAU PRODUIT :</span>
            
            <div class="grid-3">
                <input type="text" id="add-nom" placeholder="Nom du produit">
                <input type="number" id="add-stock" placeholder="Stock départ">
                <select id="add-unite">
                    <option value="U">Quantité (U)</option>
                    <option value="kg">Kilo (kg)</option>
                    <option value="L">Litre (L)</option>
                    <option value="m">Mètre (m)</option>
                    <option value="T">Tonne (T)</option>
                    <option value="Sacs">Sac(s)</option>
                    <option value="Bidons">Bidon(s)</option>
                </select>
            </div>
            <button style="background: #48bb78; padding: 8px;" onclick="ajouterNouveauProduit()">Enregistrer dans le stock</button>
        </div>

        <label>Sélectionner le produit :</label>
        <select id="select-produit-mouvement"></select>

        <div class="grid-2">
            <div>
                <label style="color: #2f855a;">📥 Ce qui ENTRE :</label>
                <input type="number" id="mouv-entre" value="0" min="0">
            </div>
            <div>
                <label style="color: #c53030;">📤 Ce qui SORT :</label>
                <input type="number" id="mouv-sorte" value="0" min="0">
            </div>
        </div>
        <button class="btn-mouvement" onclick="validerMouvement()">Valider le mouvement</button>
    </div>

    <div class="card" style="border-top: 4px solid #0b69a3;">
        <h2>2. Espace Boss (Prix)</h2>
        <label>Choisir le produit :</label>
        <select id="select-produit-prix"></select>
        
        <div class="grid-2">
            <div>
                <label>Prix en Dollar ($) :</label>
                <input type="number" id="boss-usd" value="0" step="0.01">
            </div>
            <div>
                <label>OU Prix direct en MT :</label>
                <input type="number" id="boss-mt" value="0" step="0.5">
            </div>
        </div>
        <button class="btn-boss" onclick="validerPrixBoss()">Fixer le prix</button>
    </div>

    <div class="card">
        <h2>3. État des Stocks Réels & Rapport</h2>
        
        <table>
            <thead>
                <tr>
                    <th>Produit</th>
                    <th>Prix Final</th>
                    <th>Disponible</th>
                </tr>
            </thead>
            <tbody id="table-corps"></tbody>
        </table>

        <h3 style="font-size: 0.9rem; margin-top: 20px; color: #486581;">📋 Rapport Automatique du Jour :</h3>
        <div class="report-box" id="rapport-journalier">Aucun mouvement aujourd'hui.</div>
    </div>

    <script>
        let produits = {};
        let historiqueRapport = [];

        function rafraichirEcrans() {
            let selectMouv = document.getElementById('select-produit-mouvement');
            let selectPrix = document.getElementById('select-produit-prix');
            let tableCorps = document.getElementById('table-corps');
            
            let memoireMouv = selectMouv.value;
            let memoirePrix = selectPrix.value;

            selectMouv.innerHTML = "";
            selectPrix.innerHTML = "";
            tableCorps.innerHTML = "";

            for (let nom in produits) {
                let p = produits[nom];
                selectMouv.innerHTML += `<option value="${nom}">${nom} (${p.unite})</option>`;
                selectPrix.innerHTML += `<option value="${nom}">${nom}</option>`;

                let prixAffichage = "Non fixé";
                if (p.prixMT > 0) {
                    prixAffichage = p.prixMT + " MT";
                } else if (p.prixUSD > 0) {
                    prixAffichage = (p.prixUSD * 64.5).toFixed(2) + " MT ($" + p.prixUSD + ")";
                }

                tableCorps.innerHTML += `
                    <tr>
                        <td><b>${nom}</b></td>
                        <td><span style="color:#2f855a; font-weight:bold;">${prixAffichage}</span></td>
                        <td><span class="badge-stock">${p.stock} ${p.unite}</span></td>
                    </tr>
                `;
            }

            if(memoireMouv) selectMouv.value = memoireMouv;
            if(memoirePrix) selectPrix.value = memoirePrix;
            
            genererRapport();
        }

        function ajouterNouveauProduit() {
            let nom = document.getElementById('add-nom').value.trim();
            let stockInit = parseInt(document.getElementById('add-stock').value) || 0;
            let unite = document.getElementById('add-unite').value;

            if (!nom) return alert("Écris le nom du produit !");
            if (produits[nom]) return alert("Ce produit existe déjà !");

            produits[nom] = { stock: stockInit, unite: unite, prixUSD: 0, prixMT: 0 };
            
            document.getElementById('add-nom').value = "";
            document.getElementById('add-stock').value = "";
            
            rafraichirEcrans();
        }

        function validerMouvement() {
            let nom = document.getElementById('select-produit-mouvement').value;
            let entre = parseInt(document.getElementById('mouv-entre').value) || 0;
            let TechSortie = parseInt(document.getElementById('mouv-sorte').value) || 0;

            if (!nom) return alert("Aucun produit sélectionné");
            let p = produits[nom];

            if (entre > 0) {
                p.stock += entre;
                historiqueRapport.push(`📥 ENTRÉE : +${entre} ${p.unite} pour [${nom}]`);
            }
            if (TechSortie > 0) {
                if (p.stock < TechSortie) {
                    alert(`Pas assez de stock ! Disponible : ${p.stock} ${p.unite}`);
                    return;
                }
                p.stock -= TechSortie;
                historiqueRapport.push(`📤 SORTIE : -${TechSortie} ${p.unite} pour [${nom}]`);
            }

            document.getElementById('mouv-entre').value = 0;
            document.getElementById('mouv-sorte').value = 0;
            rafraichirEcrans();
        }

        function validerPrixBoss() {
            let nom = document.getElementById('select-produit-prix').value;
            let usd = parseFloat(document.getElementById('boss-usd').value) || 0;
            let mt = parseFloat(document.getElementById('boss-mt').value) || 0;

            if (!nom) return alert("Sélectionne un produit");

            produits[nom].prixUSD = usd;
            produits[nom].prixMT = mt;
            rafraichirEcrans();
        }

        function genererRapport() {
            let box = document.getElementById('rapport-journalier');
            if (historiqueRapport.length === 0) {
                box.innerText = "Aucun mouvement aujourd'hui.";
                return;
            }
            let texte = `Rapport automatique du ${new Date().toLocaleDateString('fr-FR')}\n=========================\n`;
            historiqueRapport.forEach(l => texte += l + "\n");
            texte += `=========================\nFin de session.`;
            box.innerText = texte;
        }
    </script>
</body>
</html>
